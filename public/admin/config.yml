backend:
    name: github
    repo: phamaralbr/siriema # ⚠️ ajuste para "usuario/repositorio"
    branch: main
    # Sem base_url: o login funciona pelo botão "Sign In with Token" (token
    # pessoal do GitHub), sem precisar de nenhum servidor de autenticação.
    # Veja o passo a passo no README, seção "Como acessar o /admin".

# Evita commits direto na branch principal: cada edição vira um Pull Request
# que você pode revisar antes de publicar. Remova esta linha se preferir
# publicar direto.
publish_mode: editorial_workflow

# Sem isso, o Sveltia grava campos opcionais deixados em branco como ''
# (string vazia) em vez de simplesmente não escrevê-los — o que quebra a
# validação de schema do Astro (ex: '' não é uma data nem um enum válido).
output:
    omit_empty_optional_fields: true

media_folder: "public/images/expeditions"
public_folder: "/images/expeditions"

collections:
    - name: "expeditions"
      label: "Expedições"
      label_singular: "Expedição"
      folder: "src/content/expeditions"
      create: true
      delete: true
      slug: "{{slug}}"
      format: "frontmatter"
      extension: "md"
      identifier_field: title
      summary: "{{title}} — {{location}}"
      sortable_fields: ["date", "priceFrom", "durationDays"]
      fields:
          - { label: "Título", name: "title", widget: "string" }
          - {
                label: "Subtítulo (frase curta)",
                name: "subtitle",
                widget: "string",
            }

          - { label: "Imagem de capa", name: "cover", widget: "image" }

          - {
                label: "Localização",
                name: "location",
                widget: "string",
                hint: "Ex: Brasília, DF",
            }
          - { label: "Duração (dias)", name: "durationDays", widget: "number" }

          - label: "Data de início"
            name: "date"
            widget: "datetime"
            type: "date"

          - label: "Data de finalização"
            name: "endDate"
            widget: "datetime"
            type: "date"
            required: false

          - {
                label: "Preço a partir de (R$)",
                name: "priceFrom",
                widget: "number",
            }

          - label: "Esgotado?"
            name: "esgotado"
            widget: "boolean"
            default: false

          - {
                label: "Destaque na home?",
                name: "featured",
                widget: "boolean",
                default: false,
                required: false,
            }

          - label: "Dificuldade"
            name: "difficulty"
            widget: "select"
            options: ["Leve", "Moderada", "Intensa"]
            required: false
          - {
                label: "Tamanho do grupo",
                name: "groupSize",
                widget: "string",
                required: false,
                hint: "Ex: 6 a 12 pessoas",
            }

          - {
                label: "Observação do preço",
                name: "priceNote",
                widget: "string",
                default: "por pessoa",
                required: false,
            }

          - label: "Destaques (tags curtas)"
            name: "highlights"
            widget: "list"
            hint: "Atrativos, pontos turísticos, atividades, diferenciais..."
            required: false
            field: { label: "Destaque", name: "item", widget: "string" }

          - label: "Itinerário"
            name: "itinerary"
            widget: "list"
            required: false
            summary: "Dia {{fields.day}}: {{fields.title}}"
            fields:
                - { label: "Dia", name: "day", widget: "number" }
                - { label: "Título do dia", name: "title", widget: "string" }
                - { label: "Descrição", name: "description", widget: "text" }

          - label: "O que está incluso"
            name: "includes"
            widget: "list"
            required: false
            field: { label: "Item", name: "item", widget: "string" }

          - label: "O que não está incluso"
            name: "excludes"
            widget: "list"
            required: false
            field: { label: "Item", name: "item", widget: "string" }

          - label: "Mensagem personalizada do WhatsApp"
            name: "whatsappMessage"
            widget: "text"
            default: "Olá! Vi o catálogo de expedições e gostaria de mais informações."
            required: false

          - label: "Descrição completa"
            name: "body"
            widget: "markdown"
            required: false
